name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Run clippy
        run: nix develop -c cargo clippy --workspace --all-targets -- -D warnings

      - name: Scan for dead code
        run: env RUSTFLAGS='-Ddead_code' nix develop -c cargo check --workspace --all-targets

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Run tests
        run: nix develop -c cargo test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build package
        run: nix build

      - name: Package release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dist
          tar -C result/bin -czf "dist/waytorandr-${GITHUB_REF_NAME}-x86_64-linux.tar.gz" waytorandr waytorandrd
          sha256sum dist/* > dist/SHA256SUMS

      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
